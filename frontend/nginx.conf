server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25m;

    # Compress text assets — meaningful win on a Thailand <-> Germany link
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/xml application/xml+rss image/svg+xml;

    # Proxy API calls to the backend container (same Coolify network).
    # `snt-backend` is the backend app's Network Alias. Using a variable + the
    # Docker embedded DNS resolver lets nginx start even if the backend is
    # briefly down and re-resolve it, instead of failing at boot.
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream http://snt-backend:5001;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Hashed CRA assets are immutable — cache hard
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA client-side routing: every unknown path serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
