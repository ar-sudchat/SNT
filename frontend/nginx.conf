server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25m;

    # Compress text assets — meaningful win on a Thailand <-> Germany link
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/xml application/xml+rss image/svg+xml;

    # Proxy relative /api calls to the public backend domain. This makes the
    # site work even for browsers that cached an older bundle which calls a
    # relative /api (instead of the absolute api-snt URL). Server-side hairpin;
    # both apps are on the same host so it's effectively local.
    location /api/ {
        resolver 1.1.1.1 8.8.8.8 valid=30s;
        set $api_backend https://api-snt.duckdns.org;
        proxy_pass $api_backend;
        proxy_ssl_server_name on;
        proxy_http_version 1.1;
        proxy_set_header Host api-snt.duckdns.org;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Hashed CRA assets are immutable — cache hard
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA client-side routing: every unknown path serves index.html.
    # no-store on the HTML so browsers always re-fetch it and pick up new
    # hashed bundle names after a deploy (avoids stale-bundle cache traps).
    location / {
        add_header Cache-Control "no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
